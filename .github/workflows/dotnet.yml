# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: dotnet test --no-build --verbosity normal

  coverage:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: true
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Install coverage tools
      run: |
        dotnet tool install --global JetBrains.dotCover.CommandLineTools
        dotnet tool install --global dotnet-reportgenerator-globaltool
    - name: Run tests with dotCover
      run: |
        dotnet dotcover test \
          --dcReportType=DetailedXML \
          --dcOutput=dotCover.xml
    - name: Generate HTML report
      run: |
        reportgenerator \
          -reports:dotCover.xml \
          -targetdir:coverage-report \
          -reporttypes:"Html;JsonSummary"
    - name: Build shields.io coverage badge endpoint
      run: |
        PCT=$(jq -r '.summary.linecoverage' coverage-report/Summary.json)
        PCT_INT=${PCT%.*}
        if [ "$PCT_INT" -ge 80 ]; then COLOR=brightgreen
        elif [ "$PCT_INT" -ge 60 ]; then COLOR=yellow
        else COLOR=red; fi
        jq -n --arg msg "${PCT}%" --arg color "$COLOR" \
          '{schemaVersion:1,label:"coverage",message:$msg,color:$color}' \
          > coverage-report/coverage-badge.json
    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: coverage-report
    - name: Deploy to GitHub Pages
      id: deploy
      uses: actions/deploy-pages@v4

  release:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Extract version from csproj
      id: version
      run: |
        BASE_VERSION=$(grep -oP '<Version>\K[^<]+' src/Punch.CLI/Punch.CLI.csproj)
        FULL_VERSION="${BASE_VERSION}.${{ github.run_number }}"
        echo "full=$FULL_VERSION" >> "$GITHUB_OUTPUT"
        echo "tag=v$FULL_VERSION" >> "$GITHUB_OUTPUT"
    - name: Publish Windows binary
      run: |
        dotnet publish src/Punch.CLI -c Release -r win-x64 --self-contained \
          -p:PublishSingleFile=true \
          -p:Version=${{ steps.version.outputs.full }}
    - name: Publish Linux binary
      run: |
        dotnet publish src/Punch.CLI -c Release -r linux-x64 --self-contained \
          -p:PublishSingleFile=true \
          -p:Version=${{ steps.version.outputs.full }}
    - name: Zip outputs
      run: |
        cd src/Punch.CLI/bin/Release/net10.0/win-x64/publish
        zip -j "$GITHUB_WORKSPACE/punch-win-x64.zip" punch.exe
        cd "$GITHUB_WORKSPACE"
        cd src/Punch.CLI/bin/Release/net10.0/linux-x64/publish
        tar -czf "$GITHUB_WORKSPACE/punch-linux-x64.tar.gz" punch
    - name: Create GitHub release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release create "${{ steps.version.outputs.tag }}" \
          punch-win-x64.zip \
          punch-linux-x64.tar.gz \
          --title "${{ steps.version.outputs.tag }}" \
          --generate-notes
